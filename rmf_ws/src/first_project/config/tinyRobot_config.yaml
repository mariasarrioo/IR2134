# FLEET CONFIG =================================================================
# RMF Fleet parameters

rmf_fleet:
  name: "tinyRobot"
  limits:
    linear: [0.5, 0.75]
    angular: [0.6, 2.0]

  profile:
    footprint: 0.3
    vicinity: 0.5

  reversible: true

  battery_system:
    voltage: 12.0
    capacity: 24.0
    charging_current: 5.0

  mechanical_system:
    mass: 20.0
    moment_of_inertia: 10.0
    friction_coefficient: 0.22

  ambient_system:
    power: 20.0

  tool_system:
    power: 0.0

  recharge_threshold: 0.10
  recharge_soc: 1.0
  publish_fleet_state: 10.0
  account_for_battery_drain: true

  task_capabilities:
    loop: true
    delivery: true

  actions: ["teleop"]
  finishing_request: "park"
  responsive_wait: false
  use_parking_reservations: true
  reassign_task_interval: 120

  robots:
    tinyRobot1:
      charger: "tinyRobot1_charger"
      finishing_request:
        type: "park"
        waypoint_name: "tinyRobot1_charger"
      responsive_wait: false

    tinyRobot2:
      charger: "tinyRobot2_charger"
      finishing_request:
        type: "park"
        waypoint_name: "tinyRobot2_charger"
      responsive_wait: false

fleet_manager:
  ip: "127.0.0.1"
  port: 22011
  user: "some_user"
  password: "some_password"
